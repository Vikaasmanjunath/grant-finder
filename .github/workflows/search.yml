name: Weekly Grant Search

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run grant search
        run: python .github/scripts/search_grants.py

      - name: Commit results
        run: |
          git config user.email "grants-bot@github.com"
          git config user.name "Grant Bot"
          git pull --rebase origin main
          git add docs/
          git commit -m "Weekly grant update $(date +%F)" || echo "No changes"
          git push
