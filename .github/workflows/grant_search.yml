name: Personalized Grant Search

on:
  schedule:
    - cron: "0 13 * * 1,4"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  search-grants:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Run grant search
        run: python search_grants.py

      - name: Commit updated results
        run: |
          git config user.name "grant-bot"
          git config user.email "grant-bot@users.noreply.github.com"
          git add seen_grants.csv new_grants.csv
          git commit -m "Update grant search results" || echo "No changes"
          git push
